services:
  - type: web
    name: scanserve
    runtime: node
    plan: free            # $0/month. Data lives in Turso (free), so no disk needed.
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      # ---- Turso (free durable database) — set these in the Render dashboard ----
      # Create a free DB at https://turso.tech, then run:
      #   turso db show <name> --url        -> TURSO_DATABASE_URL
      #   turso db tokens create <name>     -> TURSO_AUTH_TOKEN
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      # ---- Optional ----
      # BASE_URL: your live URL, e.g. https://scanserve.onrender.com (for reset/verify emails)
      - key: BASE_URL
        sync: false
      # Razorpay live keys — real ₹499 billing (leave unset for demo billing)
      - key: RZP_KEY_ID
        sync: false
      - key: RZP_KEY_SECRET
        sync: false
      # Email — preferred: Brevo HTTP API (works on free hosts that block SMTP ports)
      - key: BREVO_API_KEY
        sync: false
      # SMTP — alternative to the API (may be blocked on free hosts). Needs SMTP_FROM as sender.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
