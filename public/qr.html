<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Print QR codes — ScanServe</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *{box-sizing:border-box;font-family:system-ui,sans-serif}
  body{margin:0;background:#f4f5f7;color:#1f2733}
  .bar{padding:14px 20px;background:#1f2733;color:#fff;display:flex;justify-content:space-between;align-items:center}
  .bar button{background:#b5651d;color:#fff;border:0;border-radius:8px;padding:9px 16px;cursor:pointer;font-size:14px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px;padding:20px}
  .tile{background:#fff;border:1px solid #e6e9ee;border-radius:12px;padding:18px;text-align:center;page-break-inside:avoid}
  .tile h3{margin:0 0 10px;color:#b5651d}
  .tile .cap{margin-top:10px;font-size:13px;color:#7a8694}
  @media print{.bar{display:none}body{background:#fff}.grid{gap:10px}}
</style></head>
<body>
<div class="bar"><b id="title">Table QR codes</b><button onclick="print()">Print</button></div>
<div class="grid" id="grid"></div>
<script>
const token=localStorage.getItem('ss_token'), cafe=localStorage.getItem('ss_cafe'), name=localStorage.getItem('ss_name');
if(!token){location.href='/login.html';}
document.getElementById('title').textContent=(name||'Cafe')+' — print & stick one per table';
async function load(){
  const r=await fetch(`/api/cafe/${cafe}/seats`,{headers:{Authorization:'Bearer '+token}});
  if(r.status===401){location.href='/login.html';return;}
  const seats=await r.json(); const g=document.getElementById('grid'); g.innerHTML='';
  for(const s of seats){
    const url=`${location.origin}/order.html?seat=${s.id}`;
    const t=document.createElement('div'); t.className='tile';
    t.innerHTML=`<h3>${s.label}</h3><div class="q"></div><div class="cap">Scan to order</div>`;
    g.appendChild(t);
    new QRCode(t.querySelector('.q'),{text:url,width:160,height:160});
  }
}
load();
</script>
</body></html>
