<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forgot Password — ScanServe</title>
<style>
  *{box-sizing:border-box;font-family:system-ui,sans-serif}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#faf7f2;color:#2b2117}
  .box{background:#fff;border:1px solid #ece4d8;border-radius:16px;padding:28px;width:100%;max-width:380px}
  h1{color:#b5651d;margin:0 0 4px;font-size:24px}
  p.sub{color:#8a7f72;margin:0 0 18px;font-size:14px}
  input{width:100%;padding:12px;border:1px solid #ece4d8;border-radius:10px;font-size:15px;margin-bottom:10px}
  button{width:100%;background:#b5651d;color:#fff;border:0;border-radius:10px;padding:13px;font-size:16px;font-weight:600;cursor:pointer}
  .back{text-align:center;margin-top:14px;font-size:14px;color:#b5651d;cursor:pointer}
  .msg{padding:12px;border-radius:10px;font-size:14px;margin-bottom:10px;display:none}
  .msg.ok{background:#e3f5ea;color:#1a6335}
  .msg.err{background:#fde8e6;color:#c0392b}
</style></head>
<body>
<div class="box">
  <h1>ScanServe</h1>
  <p class="sub">Reset your password</p>
  <div class="msg" id="msg"></div>
  <div id="form">
    <input id="email" type="email" placeholder="Your email address">
    <button onclick="submit()">Send reset link</button>
  </div>
  <div class="back" onclick="location.href='/login.html'">&larr; Back to login</div>
</div>
<script>
async function submit() {
  const email = document.getElementById('email').value.trim();
  const msg = document.getElementById('msg');
  if (!email) { showMsg('Please enter your email.', false); return; }
  const r = await fetch('/api/auth/forgot', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) });
  const d = await r.json();
  showMsg(d.message || 'Reset link sent!', r.ok);
  if (r.ok) document.getElementById('form').style.display = 'none';
}
function showMsg(text, ok) {
  const el = document.getElementById('msg');
  el.textContent = text; el.className = 'msg ' + (ok ? 'ok' : 'err'); el.style.display = 'block';
}
</script>
</body></html>
